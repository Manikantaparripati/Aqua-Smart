<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AquaCrop Platform</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --teal: #0a6e4e; --teal-dark: #074d37; --teal-light: #e1f5ee; --teal-mid: #1d9e75;
    --accent: #f0a500; --danger: #e24b4a; --success: #3b6d11;
    --bg: #f4f7f5; --card: #ffffff; --text: #1a2e23; --muted: #6b7f74;
    --border: #dce8e1; --sidebar: #0d3d2b;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }
  .btn { display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .2s; }
  .btn-primary { background:var(--teal);color:#fff; }
  .btn-primary:hover { background:var(--teal-dark); }
  .btn-outline { background:transparent;color:var(--teal);border:1.5px solid var(--teal); }
  .btn-outline:hover { background:var(--teal-light); }
  .btn-danger { background:var(--danger);color:#fff; }
  .btn-sm { padding:6px 12px;font-size:13px; }
  .card { background:var(--card);border-radius:12px;padding:20px;box-shadow:var(--shadow);border:1px solid var(--border); }
  .badge { display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500; }
  .badge-green { background:#eaf3de;color:#3b6d11; }
  .badge-amber { background:#faeeda;color:#854f0b; }
  .badge-red { background:#fcebeb;color:#a32d2d; }
  .badge-blue { background:#e6f1fb;color:#185fa5; }
  input,select,textarea { width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;background:#fff;color:var(--text);outline:none;transition:border .2s; }
  input:focus,select:focus,textarea:focus { border-color:var(--teal); }
  label { font-size:13px;font-weight:500;color:var(--muted);display:block;margin-bottom:4px; }
  .form-group { margin-bottom:16px; }
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-thumb { background:var(--border);border-radius:4px; }
  .fade-in { animation:fadeIn .35s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useContext, createContext, useCallback } = React;

// ─── Context ─────────────────────────────────────────────────────────────────
const AppCtx = createContext();

// ─── Mock Data ────────────────────────────────────────────────────────────────
const MOCK_PRODUCTS = [
  { _id:'p1', name:'Premium Fish Feed 1kg', description:'High protein pellets for healthy fish growth', price:299, category:'aquafeed', stock:200, image:'🐟' },
  { _id:'p2', name:'Shrimp Starter Feed', description:'Micro pellets for shrimp larvae and juveniles', price:450, category:'aquafeed', stock:150, image:'🦐' },
  { _id:'p3', name:'Growth Supplement', description:'Vitamins & minerals blend for aquaculture', price:399, category:'aquafeed', stock:100, image:'💊' },
  { _id:'p4', name:'Anti-Bacterial Medicine', description:'Treats bacterial infections in fish', price:599, category:'medicine', stock:80, image:'🧪' },
  { _id:'p5', name:'Water Treatment Solution', description:'Balances pH and removes harmful chemicals', price:349, category:'medicine', stock:120, image:'💧' },
  { _id:'p6', name:'Fish Vitamins Boost', description:'Boosts immunity and promotes growth', price:249, category:'medicine', stock:200, image:'⚗️' },
  { _id:'p7', name:'Fresh Prawns (1kg)', description:'Farm-fresh tiger prawns, live delivery', price:850, category:'marketplace', stock:50, image:'🦞', seller:'RajaFarm' },
  { _id:'p8', name:'Paddy Seeds (5kg)', description:'High yield IR-64 paddy seeds', price:320, category:'marketplace', stock:300, image:'🌾', seller:'SeedMart' },
  { _id:'p9', name:'Organic Fertilizer 10kg', description:'Bio-compost for healthy soil and crops', price:199, category:'marketplace', stock:500, image:'🌱', seller:'GreenGrow' },
];

const MOCK_BOOKINGS = [
  { _id:'b1', name:'Ravi Kumar', phone:'9876543210', serviceType:'Motor Repair', status:'confirmed', createdAt:'2024-01-15' },
  { _id:'b2', name:'Priya Sharma', phone:'9123456780', serviceType:'Aerator Fix', status:'pending', createdAt:'2024-01-16' },
  { _id:'b3', name:'Mohan Das', phone:'9012345678', serviceType:'Electrical', status:'completed', createdAt:'2024-01-14' },
];

const MOCK_USERS = [
  { _id:'u1', name:'Admin User', email:'admin@aquacrop.com', role:'admin', createdAt:'2024-01-01' },
  { _id:'u2', name:'Ravi Kumar', email:'ravi@example.com', role:'user', createdAt:'2024-01-10' },
  { _id:'u3', name:'Priya Sharma', email:'priya@example.com', role:'user', createdAt:'2024-01-12' },
  { _id:'u4', name:'Mohan Das', email:'mohan@example.com', role:'user', createdAt:'2024-01-14' },
];

// ─── AppProvider ──────────────────────────────────────────────────────────────
function AppProvider({ children }) {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('login');
  const [cart, setCart] = useState([]);
  const [products, setProducts] = useState(MOCK_PRODUCTS);
  const [bookings, setBookings] = useState(MOCK_BOOKINGS);
  const [toast, setToast] = useState(null);

  const showToast = useCallback((msg, type='success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }, []);

  const login = (userData) => {
    setUser(userData);
    setPage(userData.role === 'admin' ? 'admin-dashboard' : 'home');
  };
  const logout = () => { setUser(null); setPage('login'); setCart([]); };
  const addToCart = (product) => {
    setCart(c => {
      const ex = c.find(i => i._id === product._id);
      if (ex) return c.map(i => i._id === product._id ? {...i, qty: i.qty+1} : i);
      return [...c, {...product, qty:1}];
    });
    showToast(`${product.name} added to cart!`);
  };
  const removeFromCart = (id) => setCart(c => c.filter(i => i._id !== id));

  return (
    <AppCtx.Provider value={{ user, login, logout, page, setPage, cart, addToCart, removeFromCart,
      products, setProducts, bookings, setBookings, showToast }}>
      {children}
      {toast && (
        <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,
          background: toast.type==='success'?'var(--teal)':toast.type==='error'?'var(--danger)':'var(--accent)',
          color:'#fff',padding:'12px 20px',borderRadius:10,fontSize:14,fontWeight:500,
          boxShadow:'0 4px 20px rgba(0,0,0,0.2)',animation:'fadeIn .3s ease'}}>
          {toast.msg}
        </div>
      )}
    </AppCtx.Provider>
  );
}

// ─── Navbar ───────────────────────────────────────────────────────────────────
function Navbar() {
  const { user, logout, setPage, page, cart } = useContext(AppCtx);
  const navItems = [
    { key:'home', label:'Home', icon:'🏠' },
    { key:'aquafeed', label:'Aqua Feed', icon:'🐟' },
    { key:'medicine', label:'Medicine', icon:'💊' },
    { key:'repair', label:'Repair Service', icon:'🔧' },
    { key:'marketplace', label:'Marketplace', icon:'🛒' },
  ];
  return (
    <nav style={{background:'var(--teal)',color:'#fff',padding:'0 24px',display:'flex',alignItems:'center',
      justifyContent:'space-between',height:60,boxShadow:'0 2px 12px rgba(0,0,0,0.15)',position:'sticky',top:0,zIndex:100}}>
      <div style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}} onClick={()=>setPage('home')}>
        <span style={{fontSize:22}}>🌊</span>
        <span style={{fontFamily:'Syne',fontWeight:700,fontSize:18,letterSpacing:'0.5px'}}>AquaCrop</span>
      </div>
      <div style={{display:'flex',gap:4,alignItems:'center'}}>
        {navItems.map(n => (
          <button key={n.key} onClick={()=>setPage(n.key)}
            style={{background:page===n.key?'rgba(255,255,255,0.2)':'transparent',color:'#fff',
              border:'none',padding:'6px 12px',borderRadius:6,cursor:'pointer',fontSize:13,
              fontWeight:500,display:'flex',alignItems:'center',gap:5,transition:'background .2s'}}>
            <span style={{fontSize:14}}>{n.icon}</span>{n.label}
          </button>
        ))}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <button onClick={()=>setPage('cart')} style={{background:'rgba(255,255,255,0.15)',border:'none',
          color:'#fff',padding:'6px 14px',borderRadius:8,cursor:'pointer',fontSize:13,fontWeight:500}}>
          🛒 Cart {cart.length > 0 && <span style={{background:'var(--accent)',color:'#fff',borderRadius:'50%',
            padding:'1px 6px',fontSize:11,marginLeft:4}}>{cart.length}</span>}
        </button>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:32,height:32,borderRadius:'50%',background:'rgba(255,255,255,0.25)',
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:600}}>
            {user?.name?.[0]}
          </div>
          <span style={{fontSize:13}}>{user?.name?.split(' ')[0]}</span>
          {user?.role==='admin' && <span className="badge badge-amber" style={{fontSize:11}}>Admin</span>}
        </div>
        <button onClick={logout} className="btn btn-sm"
          style={{background:'rgba(255,255,255,0.15)',color:'#fff',border:'1px solid rgba(255,255,255,0.3)'}}>
          Logout
        </button>
      </div>
    </nav>
  );
}

// ─── ProductCard ──────────────────────────────────────────────────────────────
function ProductCard({ product, onAdd }) {
  return (
    <div className="card fade-in" style={{display:'flex',flexDirection:'column',gap:12}}>
      <div style={{background:'var(--teal-light)',borderRadius:8,height:80,display:'flex',
        alignItems:'center',justifyContent:'center',fontSize:36}}>
        {product.image || '📦'}
      </div>
      <div>
        <h4 style={{fontSize:15,fontWeight:600,marginBottom:4}}>{product.name}</h4>
        <p style={{fontSize:13,color:'var(--muted)',lineHeight:1.5}}>{product.description}</p>
        {product.seller && <p style={{fontSize:12,color:'var(--teal)',marginTop:4}}>by {product.seller}</p>}
      </div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:'auto'}}>
        <span style={{fontFamily:'Syne',fontSize:18,fontWeight:700,color:'var(--teal)'}}>₹{product.price}</span>
        <button className="btn btn-primary btn-sm" onClick={()=>onAdd(product)}>+ Add to Cart</button>
      </div>
    </div>
  );
}

// ─── Login Page ───────────────────────────────────────────────────────────────
function LoginPage() {
  const { login, setPage, showToast } = useContext(AppCtx);
  const [form, setForm] = useState({ email:'', password:'' });
  const [loading, setLoading] = useState(false);
  const [isRegister, setIsRegister] = useState(false);
  const [regForm, setRegForm] = useState({ name:'', email:'', password:'' });

  const handleLogin = async (e) => {
    e.preventDefault();
    setLoading(true);
    setTimeout(() => {
      if (form.email === 'admin@aquacrop.com' && form.password === 'admin123') {
        login({ _id:'u1', name:'Admin User', email:'admin@aquacrop.com', role:'admin' });
      } else if (form.email && form.password) {
        login({ _id:'u2', name:'Demo User', email: form.email, role:'user' });
      } else {
        showToast('Invalid credentials', 'error');
      }
      setLoading(false);
    }, 800);
  };

  const handleRegister = (e) => {
    e.preventDefault();
    if (!regForm.name || !regForm.email || !regForm.password) {
      return showToast('All fields required', 'error');
    }
    login({ _id:'new', name: regForm.name, email: regForm.email, role:'user' });
    showToast('Account created!');
  };

  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg, #0a6e4e 0%, #0d3d2b 50%, #1a2e23 100%)',
      display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{width:'100%',maxWidth:420}}>
        <div style={{textAlign:'center',marginBottom:32,color:'#fff'}}>
          <div style={{fontSize:48,marginBottom:12}}>🌊</div>
          <h1 style={{fontFamily:'Syne',fontSize:30,fontWeight:700,letterSpacing:'1px'}}>AquaCrop Platform</h1>
          <p style={{color:'rgba(255,255,255,0.65)',fontSize:14,marginTop:8}}>
            Smart solutions for aquaculture & agriculture
          </p>
        </div>
        <div className="card" style={{padding:28}}>
          <div style={{display:'flex',marginBottom:24,background:'var(--bg)',borderRadius:8,padding:4}}>
            {['Login','Register'].map((t,i) => (
              <button key={t} onClick={()=>setIsRegister(i===1)}
                style={{flex:1,padding:'8px',borderRadius:6,border:'none',cursor:'pointer',fontWeight:500,fontSize:14,
                  background:isRegister===(i===1)?'var(--teal)':'transparent',
                  color:isRegister===(i===1)?'#fff':'var(--muted)',transition:'all .2s'}}>
                {t}
              </button>
            ))}
          </div>
          {!isRegister ? (
            <form onSubmit={handleLogin}>
              <div className="form-group">
                <label>Email</label>
                <input type="email" placeholder="your@email.com" value={form.email}
                  onChange={e=>setForm({...form,email:e.target.value})} required />
              </div>
              <div className="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" value={form.password}
                  onChange={e=>setForm({...form,password:e.target.value})} required />
              </div>
              <p style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>
                Demo: admin@aquacrop.com / admin123 &nbsp;|&nbsp; any email for user
              </p>
              <button type="submit" className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:12}}>
                {loading ? 'Signing in...' : 'Login →'}
              </button>
            </form>
          ) : (
            <form onSubmit={handleRegister}>
              <div className="form-group">
                <label>Full Name</label>
                <input placeholder="Your name" value={regForm.name}
                  onChange={e=>setRegForm({...regForm,name:e.target.value})} required />
              </div>
              <div className="form-group">
                <label>Email</label>
                <input type="email" placeholder="your@email.com" value={regForm.email}
                  onChange={e=>setRegForm({...regForm,email:e.target.value})} required />
              </div>
              <div className="form-group">
                <label>Password</label>
                <input type="password" placeholder="Min 6 characters" value={regForm.password}
                  onChange={e=>setRegForm({...regForm,password:e.target.value})} required />
              </div>
              <button type="submit" className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:12}}>
                Create Account →
              </button>
            </form>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Home Page ────────────────────────────────────────────────────────────────
function HomePage() {
  const { user, setPage } = useContext(AppCtx);
  const services = [
    { key:'aquafeed', icon:'🐟', title:'Aqua Feed', desc:'Premium fish & shrimp feeds', color:'#e1f5ee', border:'#9fe1cb' },
    { key:'medicine', icon:'💊', title:'Medicine', desc:'Treatments & water care', color:'#e6f1fb', border:'#b5d4f4' },
    { key:'repair', icon:'🔧', title:'Repair Service', desc:'Motor, aerator & electrical', color:'#faeeda', border:'#fac775' },
    { key:'marketplace', icon:'🛒', title:'Marketplace', desc:'Buy & sell crops, fish', color:'#eaf3de', border:'#c0dd97' },
  ];
  const stats = [
    { label:'Products', value:'200+', icon:'📦' },
    { label:'Farmers', value:'5,000+', icon:'👨‍🌾' },
    { label:'States', value:'12', icon:'🗺️' },
    { label:'Experts', value:'50+', icon:'👨‍⚕️' },
  ];
  return (
    <div style={{padding:'32px 24px',maxWidth:1100,margin:'0 auto'}} className="fade-in">
      {/* Banner */}
      <div style={{background:'linear-gradient(135deg, var(--teal) 0%, #0d3d2b 100%)',
        borderRadius:16,padding:'40px 36px',color:'#fff',marginBottom:32,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',right:-20,top:-20,fontSize:120,opacity:0.08}}>🌊</div>
        <h2 style={{fontSize:28,fontWeight:700,marginBottom:8}}>Welcome back, {user?.name?.split(' ')[0]}! 👋</h2>
        <p style={{color:'rgba(255,255,255,0.75)',fontSize:15,marginBottom:20,maxWidth:500}}>
          Your one-stop platform for aquaculture and agriculture solutions.
          Manage feeds, medicines, repairs, and trade all in one place.
        </p>
        <div style={{display:'flex',gap:12}}>
          <button className="btn" onClick={()=>setPage('aquafeed')}
            style={{background:'#fff',color:'var(--teal)',fontWeight:600}}>Browse Products</button>
          <button className="btn" onClick={()=>setPage('marketplace')}
            style={{background:'rgba(255,255,255,0.15)',color:'#fff',border:'1px solid rgba(255,255,255,0.3)'}}>
            Open Marketplace
          </button>
        </div>
      </div>
      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:32}}>
        {stats.map(s => (
          <div key={s.label} className="card" style={{textAlign:'center',padding:16}}>
            <div style={{fontSize:24,marginBottom:6}}>{s.icon}</div>
            <div style={{fontFamily:'Syne',fontSize:22,fontWeight:700,color:'var(--teal)'}}>{s.value}</div>
            <div style={{fontSize:13,color:'var(--muted)'}}>{s.label}</div>
          </div>
        ))}
      </div>
      {/* Services */}
      <h3 style={{fontSize:20,marginBottom:16,fontWeight:700}}>Our Services</h3>
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16}}>
        {services.map(s => (
          <div key={s.key} onClick={()=>setPage(s.key)} className="card"
            style={{cursor:'pointer',display:'flex',gap:16,alignItems:'center',
              background:`linear-gradient(135deg, ${s.color} 0%, #fff 100%)`,
              border:`1.5px solid ${s.border}`,transition:'transform .2s'}}
            onMouseEnter={e=>e.currentTarget.style.transform='translateY(-2px)'}
            onMouseLeave={e=>e.currentTarget.style.transform='translateY(0)'}>
            <div style={{width:56,height:56,borderRadius:12,background:'#fff',display:'flex',
              alignItems:'center',justifyContent:'center',fontSize:26,boxShadow:'var(--shadow)'}}>
              {s.icon}
            </div>
            <div>
              <h4 style={{fontSize:16,fontWeight:600,marginBottom:4}}>{s.title}</h4>
              <p style={{fontSize:13,color:'var(--muted)'}}>{s.desc}</p>
            </div>
            <span style={{marginLeft:'auto',fontSize:18,color:'var(--teal)'}}>→</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Generic Product Page ──────────────────────────────────────────────────────
function ProductPage({ category, title, subtitle, icon }) {
  const { products, addToCart } = useContext(AppCtx);
  const filtered = products.filter(p => p.category === category);
  return (
    <div style={{padding:'32px 24px',maxWidth:1100,margin:'0 auto'}} className="fade-in">
      <div style={{marginBottom:28}}>
        <h2 style={{fontSize:24,fontWeight:700,display:'flex',alignItems:'center',gap:10}}>
          <span>{icon}</span>{title}
        </h2>
        <p style={{color:'var(--muted)',fontSize:14,marginTop:4}}>{subtitle}</p>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:20}}>
        {filtered.map(p => <ProductCard key={p._id} product={p} onAdd={addToCart} />)}
      </div>
    </div>
  );
}

// ─── Repair Service Page ───────────────────────────────────────────────────────
function RepairPage() {
  const { user, bookings, setBookings, showToast } = useContext(AppCtx);
  const [form, setForm] = useState({ name:'', phone:'', serviceType:'', message:'' });
  const [submitted, setSubmitted] = useState(false);
  const serviceTypes = ['Motor Repair','Aerator Fix','Tractor Service','Electrical Work','Pump Repair','Generator Service'];

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!form.name || !form.phone || !form.serviceType) return showToast('Fill required fields','error');
    const booking = { _id: 'b'+Date.now(), ...form, status:'pending', createdAt: new Date().toISOString().split('T')[0] };
    setBookings(prev => [booking, ...prev]);
    showToast('Booking submitted! We will contact you soon.');
    setSubmitted(true);
    setForm({ name:'', phone:'', serviceType:'', message:'' });
    setTimeout(() => setSubmitted(false), 3000);
  };

  return (
    <div style={{padding:'32px 24px',maxWidth:900,margin:'0 auto'}} className="fade-in">
      <div style={{marginBottom:28}}>
        <h2 style={{fontSize:24,fontWeight:700,display:'flex',alignItems:'center',gap:10}}>
          🔧 Repair Service
        </h2>
        <p style={{color:'var(--muted)',fontSize:14,marginTop:4}}>Book expert repair for motors, aerators, and more</p>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
        {/* Booking Form */}
        <div className="card">
          <h3 style={{fontSize:17,fontWeight:600,marginBottom:20,color:'var(--teal)'}}>📋 Book a Service</h3>
          {submitted && (
            <div style={{background:'var(--teal-light)',border:'1.5px solid #9fe1cb',borderRadius:8,
              padding:12,marginBottom:16,color:'var(--teal)',fontSize:14,fontWeight:500}}>
              ✅ Booking confirmed! We'll call you within 2 hours.
            </div>
          )}
          <form onSubmit={handleSubmit}>
            <div className="form-group">
              <label>Full Name *</label>
              <input placeholder="Your name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} />
            </div>
            <div className="form-group">
              <label>Phone Number *</label>
              <input placeholder="10-digit mobile number" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} />
            </div>
            <div className="form-group">
              <label>Service Type *</label>
              <select value={form.serviceType} onChange={e=>setForm({...form,serviceType:e.target.value})}>
                <option value="">-- Select service --</option>
                {serviceTypes.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            <div className="form-group">

// ─── Marketplace Page ──────────────────────────────────────────────────────────
function MarketplacePage() {
  const { products, setProducts, addToCart, showToast } = useContext(AppCtx);
  const [tab, setTab] = useState('buy');
  const [form, setForm] = useState({ name:'', description:'', price:'', category:'marketplace' });
  const listings = products.filter(p => p.category === 'marketplace');

  const handleAdd = (e) => {
    e.preventDefault();
    if (!form.name || !form.price) return showToast('Name and price required','error');
    const newProduct = { _id:'m'+Date.now(), ...form, price: Number(form.price), stock:100, image:'📦', seller:'You' };
    setProducts(prev => [...prev, newProduct]);
    showToast('Product listed successfully!');
    setForm({ name:'', description:'', price:'', category:'marketplace' });
  };

  return (
    <div style={{padding:'32px 24px',maxWidth:1100,margin:'0 auto'}} className="fade-in">
      <div style={{marginBottom:28}}>
        <h2 style={{fontSize:24,fontWeight:700,display:'flex',alignItems:'center',gap:10}}>
          🛒 Crop Marketplace
        </h2>
        <p style={{color:'var(--muted)',fontSize:14,marginTop:4}}>Buy and sell crops, seeds, and farm products</p>
      </div>
      <div style={{display:'flex',gap:4,background:'var(--teal-light)',borderRadius:10,padding:4,marginBottom:24,width:'fit-content'}}>
        {['buy','sell'].map(t => (
          <button key={t} onClick={()=>setTab(t)}
            style={{padding:'8px 24px',borderRadius:7,border:'none',cursor:'pointer',
              fontWeight:600,fontSize:14,textTransform:'capitalize',
              background:tab===t?'var(--teal)':'transparent',
              color:tab===t?'#fff':'var(--teal)',transition:'all .2s'}}>
            {t==='buy'?'🛒 Buy':'➕ Sell'}
          </button>
        ))}
      </div>
      {tab === 'buy' ? (
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:20}}>
          {listings.map(p => <ProductCard key={p._id} product={p} onAdd={addToCart} />)}
        </div>
      ) : (
        <div style={{maxWidth:500}}>
          <div className="card">
            <h3 style={{fontSize:17,fontWeight:600,marginBottom:20,color:'var(--teal)'}}>List Your Product</h3>
            <form onSubmit={handleAdd}>
              <div className="form-group">
                <label>Product Name *</label>
                <input placeholder="e.g. Fresh Prawns 1kg" value={form.name}
                  onChange={e=>setForm({...form,name:e.target.value})} />
              </div>
              <div className="form-group">
                <label>Description</label>
                <textarea rows={3} placeholder="Describe your product..." value={form.description}
                  onChange={e=>setForm({...form,description:e.target.value})} style={{resize:'vertical'}} />
              </div>
              <div className="form-group">
                <label>Price (₹) *</label>
                <input type="number" placeholder="0" value={form.price}
                  onChange={e=>setForm({...form,price:e.target.value})} />
              </div>
              <button type="submit" className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:11}}>
                List Product
              </button>
            </form>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Cart Page ─────────────────────────────────────────────────────────────────
function CartPage() {
  const { cart, removeFromCart, showToast, setPage } = useContext(AppCtx);
  const total = cart.reduce((s,i) => s + i.price * i.qty, 0);

  const handleCheckout = () => {
    showToast('Order placed! Payment integration via Razorpay.');
    setPage('home');
  };

  return (
    <div style={{padding:'32px 24px',maxWidth:700,margin:'0 auto'}} className="fade-in">
      <h2 style={{fontSize:24,fontWeight:700,marginBottom:24}}>🛒 Your Cart</h2>
      {cart.length === 0 ? (
        <div className="card" style={{textAlign:'center',padding:48}}>
          <div style={{fontSize:56,marginBottom:16}}>🛒</div>
          <h3 style={{fontWeight:600,marginBottom:8}}>Cart is empty</h3>
          <p style={{color:'var(--muted)',marginBottom:20}}>Add products from our store</p>
          <button className="btn btn-primary" onClick={()=>setPage('aquafeed')}>Browse Products</button>
        </div>
      ) : (
        <div>
          {cart.map(item => (
            <div key={item._id} className="card" style={{display:'flex',alignItems:'center',gap:16,marginBottom:12}}>
              <div style={{width:48,height:48,borderRadius:8,background:'var(--teal-light)',
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>
                {item.image}
              </div>
              <div style={{flex:1}}>
                <p style={{fontWeight:600,fontSize:14}}>{item.name}</p>
                <p style={{color:'var(--muted)',fontSize:13}}>₹{item.price} × {item.qty}</p>
              </div>
              <p style={{fontFamily:'Syne',fontWeight:700,color:'var(--teal)'}}>₹{item.price * item.qty}</p>
              <button onClick={()=>removeFromCart(item._id)} className="btn btn-danger btn-sm">✕</button>
            </div>
          ))}
          <div className="card" style={{marginTop:20}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:16}}>
              <span style={{fontWeight:600,fontSize:16}}>Total</span>
              <span style={{fontFamily:'Syne',fontWeight:700,fontSize:22,color:'var(--teal)'}}>₹{total}</span>
            </div>
            <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:12,fontSize:15}}
              onClick={handleCheckout}>
              Proceed to Checkout (Razorpay)
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── App Router ────────────────────────────────────────────────────────────────
function AppRouter() {
  const { user, page } = useContext(AppCtx);

  if (!user) return <LoginPage />;

  const renderPage = () => {
    if (user.role === 'admin' && (page.startsWith('admin') || page === 'home')) return <AdminPanel />;
    switch (page) {
      case 'home':        return <HomePage />;
      case 'aquafeed':    return <ProductPage category="aquafeed" title="Aqua Feed" subtitle="Premium fish & shrimp feeds, supplements" icon="🐟" />;
      case 'medicine':    return <ProductPage category="medicine" title="Medicine" subtitle="Disease treatments, water care & vitamins" icon="💊" />;
      case 'repair':      return <RepairPage />;
      case 'marketplace': return <MarketplacePage />;
      case 'cart':        return <CartPage />;
      default:            return <HomePage />;
    }
  };

  return (
    <div>
      <Navbar />
      {renderPage()}
    </div>
  );
}

// ─── Root ──────────────────────────────────────────────────────────────────────
function App() {
  return (
    <AppProvider>
      <AppRouter />
    </AppProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
